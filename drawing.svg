         style="stroke-width:1"
         x="-559.95795"
         y="710.47412"
         id="tspan18">📋 RPP Digital Terstruktur — Identitas Modul, Desain Pembelajaran, hingga Kegiatan Pembelajaran tersusun rapi otomatis</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:1"
         x="-559.95789"
         y="745.89911"
         id="tspan19">🔗 Integrasi CP &amp; TP — Pilih Capaian Pembelajaran, Tujuan Pembelajaran muncul otomatis tinggal centang</tspan><tspan
