         style="stroke-width:1"
         x="-559.95789"
         y="781.3241"
         id="tspan20">🖨️ Cetak Langsung — Format resmi siap cetak dengan kop surat dan tanda tangan</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:1"
         x="-559.95795"
