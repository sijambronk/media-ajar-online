         style="stroke-width:0.554089"
         x="-763.06396"
         y="188.61902"
         id="tspan5">✅ Buat RPP Digital dalam hitungan menit ✅ Terintegrasi dengan CP &amp; Tujuan Pembelajaran otomatis ✅ Preview &amp; Cetak langsung dengan format resmi ✅ GRATIS untuk versi Lite!</tspan><tspan
